name: Build and Release Docker Images

on:
  workflow_dispatch:
  release:
    types: [created]
  schedule:
    - cron: '0 20 1/7 * *' # 每天北京时间 04:00 执行

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 关键权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh
          gh auth setup-git

      - name: Sync Pull All Docker Images
        id: sync_pull_images
        run: |
          python - <<EOF
          import yaml
          import subprocess
          
          # 读取配置文件
          with open('docker-images.yml', 'r') as file:
              config = yaml.safe_load(file)
          
          # 同步拉取所有镜像
          print("Synchronizing all Docker images...")
          all_images = []
          for group_name, images in config['image_groups'].items():
              print(f"Syncing group: {group_name}")
              all_images.extend(images)
          
          # 拉取所有镜像
          for image in all_images:
              print(f"Pulling image: {image}")
              subprocess.run(["docker", "pull", image], check=True)
          
          print("All Docker images synchronized successfully!")
          EOF

      - name: Process Docker Images
        id: process_images
        run: |
          mkdir -p output
          python - <<EOF
          import yaml
          import os
          import subprocess
          import hashlib
          
          # 读取配置文件
          with open('docker-images.yml', 'r') as file:
              config = yaml.safe_load(file)
          
          # 处理每个镜像组
          for group_name, images in config['image_groups'].items():
              print(f"Processing group: {group_name}")
              
              # 由于已经在前一步骤同步拉取了所有镜像，这里不再需要拉取
              
              # 保存镜像到tar.gz
              output_file = f"output/{group_name}.tar.gz"
              save_cmd = ["docker", "save"] + images
              
              with open(output_file, 'wb') as f:
                  save_process = subprocess.Popen(save_cmd, stdout=subprocess.PIPE)
                  gzip_process = subprocess.Popen(["gzip"], stdin=save_process.stdout, stdout=f)
                  save_process.stdout.close()  # 允许save_process在pipe关闭时接收SIGPIPE
                  gzip_process.communicate()
              
              # 计算MD5
              md5_hash = hashlib.md5()
              with open(output_file, 'rb') as f:
                  for chunk in iter(lambda: f.read(4096), b""):
                      md5_hash.update(chunk)
              
              md5_value = md5_hash.hexdigest()
              
              # 为每个分组创建独立的MD5文件
              with open(f"output/{group_name}.md5", 'w') as group_md5_file:
                  group_md5_file.write(f"{md5_value}")
              

              print(f"Generated {output_file} with MD5: {md5_value}")

              # 上传到 GitHub Releases
              release_tag = group_name  # 使用分组名作为 Release 标签
              release_name = f"{group_name} Docker Images"
              
              # 检查 Release 是否存在，如果不存在则创建
              try:
                  subprocess.run(["gh", "release", "view", release_tag], check=True, capture_output=True)
                  print(f"Release {release_tag} already exists. Updating it...")
                  # 如果存在，删除旧的资产并重新上传
                  subprocess.run(["gh", "release", "delete-asset", output_file, "--repo", os.environ.get('GITHUB_REPOSITORY'), "--yes"], check=False) # 忽略错误，如果文件不存在
                  subprocess.run(["gh", "release", "delete-asset", f"output/{group_name}.md5", "--repo", os.environ.get('GITHUB_REPOSITORY'), "--yes"], check=False) # 忽略错误，如果文件不存在
                  subprocess.run(["gh", "release", "upload", release_tag, output_file, f"output/{group_name}.md5", "--clobber"], check=True)
              except subprocess.CalledProcessError:
                  print(f"Release {release_tag} does not exist. Creating it...")
                  subprocess.run(["gh", "release", "create", release_tag, "--title", release_name, "--notes", f"Docker images for {group_name}", output_file, f"output/{group_name}.md5"], check=True)

          print("All docker images processed successfully!")
          EOF

      - name: Upload All to Latest GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            output/*.tar.gz
            output/*.md5
          tag_name: latest              # 指定上传到 latest 标签
          overwrite: true # 覆盖已存在的资产


